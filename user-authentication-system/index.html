<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Authentication System</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main class="page">
    <section class="auth-box">

      <aside class="brand-panel">
        <div class="shield-logo">
          <div class="lock-body">
            <div class="lock-shackle"></div>
            <div class="lock-box"></div>
          </div>
        </div>

        <h1>
          SECURE ACCESS<br>
          <span>PORTAL</span>
        </h1>

        <p class="brand-text">
          Your data. Your account.<br>
          Always protected.
        </p>

        <div class="features">
          <div class="feature">
            <span class="mini-shield"></span>
            <div>
              <strong>Secure</strong>
              <small>Industry standard security</small>
            </div>
          </div>

          <div class="feature">
            <span class="mini-shield"></span>
            <div>
              <strong>Private</strong>
              <small>Your information is safe</small>
            </div>
          </div>
        </div>
      </aside>

      <section class="welcome-panel">
        <h2>Welcome</h2>

        <p>
          Please sign in or create an<br>
          account to continue.
        </p>

        <button class="primary-btn">Sign In</button>
        <button class="secondary-btn">Create Account</button>

        <small>© 2024 Secure Access Portal</small>
      </section>

    </section>
  </main>
</body>
</html>
