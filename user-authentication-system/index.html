<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Authentication System</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main class="screen">
    <section class="auth-card">

      <aside class="left-panel">
        <div class="logo">🔒</div>

        <h1>
          SECURE ACCESS<br>
          <span>PORTAL</span>
        </h1>

        <p>Your data. Your account.<br>Always protected.</p>

        <div class="features">
          <div>
            <strong>🛡 Secure</strong>
            <small>Industry standard security</small>
          </div>

          <div>
            <strong>🔐 Private</strong>
            <small>Your information is safe</small>
          </div>
        </div>
      </aside>

      <section class="right-panel">
        <h2>Welcome</h2>

        <p>Please sign in or create an<br>account to continue.</p>

        <button>Sign In</button>
        <button class="outline">Create Account</button>

        <small>© 2024 Secure Access Portal</small>
      </section>

    </section>
  </main>
</body>
</html>
