<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication System</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>

    <div class="container">

        <!-- Left Panel -->
        <div class="left-panel">

            <div class="logo-box">
                🔒
            </div>

            <h1>Secure Access Portal</h1>

            <p>
                Your data. Your account.
                Always protected.
            </p>

        </div>

        <!-- Right Panel -->
        <div class="right-panel">

            <div class="auth-card">

                <h2>Welcome</h2>

                <p class="subtitle">
                    Please sign in or create an account.
                </p>

                <button id="showSignInBtn">
                    Sign In
                </button>

                <button id="showSignUpBtn" class="secondary-btn">
                    Create Account
                </button>

            </div>

        </div>

    </div>

</body>
</html>
