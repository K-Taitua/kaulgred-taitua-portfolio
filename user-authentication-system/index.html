<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Authentication System</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main class="page">
    <section class="auth-box">

      <aside class="brand-panel">
        <div class="shield-logo">
          <svg viewBox="0 0 80 90">
            <path class="shield-path" d="M40 5 L68 18 V43 C68 64 54 78 40 85 C26 78 12 64 12 43 V18 Z" />
            <rect class="lock-box" x="28" y="42" width="24" height="22" rx="3" />
            <path class="lock-shackle" d="M32 42 V33 C32 27 35 23 40 23 C45 23 48 27 48 33 V42" />
            <circle class="key-hole" cx="40" cy="53" r="2.5" />
            <path class="key-line" d="M40 55 V59" />
          </svg>
        </div>

        <h1>
          SECURE ACCESS<br>
          <span>PORTAL</span>
        </h1>

        <p class="brand-text">
          Your data. Your account.<br>
          Always protected.
        </p>

        <div class="features">
          <div class="feature">
            <span class="mini-shield"></span>
            <div>
              <strong>Secure</strong>
              <small>Industry standard security</small>
            </div>
          </div>

          <div class="feature">
            <span class="mini-shield"></span>
            <div>
              <strong>Private</strong>
              <small>Your information is safe</small>
            </div>
          </div>
        </div>
      </aside>

      <section class="welcome-panel">
        <h2>Welcome</h2>

        <p>
          Please sign in or create an<br>
          account to continue.
        </p>

        <button class="primary-btn">Sign In</button>
        <button class="secondary-btn">Create Account</button>
      </section>

    </section>
  </main>
</body>
</html>
