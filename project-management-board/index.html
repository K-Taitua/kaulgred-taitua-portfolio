<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project Management Board</title>

  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <h1>Project Board</h1>

      <p>
        Create, organise, and track tasks across each project stage.
      </p>

      <div class="sidebar-card">
        <p>Total Tasks</p>
        <strong id="totalTasks">0</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Workflow</p>
          <h2>Project Management Board</h2>
          <p class="subtitle">
            Drag tasks between columns to update progress.
          </p>
        </div>

        <button id="addTaskBtn" class="add-btn">+ New Task</button>
      </header>

      <section class="board">

        <div class="column" data-status="todo">
          <div class="column-header">
            <h3>To Do</h3>
            <span class="count">0</span>
          </div>
          <div class="task-list"></div>
        </div>

        <div class="column" data-status="doing">
          <div class="column-header">
            <h3>Doing</h3>
            <span class="count">0</span>
          </div>
          <div class="task-list"></div>
        </div>

        <div class="column" data-status="review">
          <div class="column-header">
            <h3>To Be Reviewed</h3>
            <span class="count">0</span>
          </div>
          <div class="task-list"></div>
        </div>

        <div class="column" data-status="done">
          <div class="column-header">
            <h3>Done</h3>
            <span class="count">0</span>
          </div>
          <div class="task-list"></div>
        </div>

      </section>
    </main>

  </div>
</body>
</html>
